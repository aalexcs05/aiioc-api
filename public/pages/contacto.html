<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - AIIOC</title>
    <link rel="icon" type="image/x-icon" href="../img/Logo_App.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="main-header">
        <div class="header-content">
            <div class="logo">
                <img src="../img/Logo.png" alt="AIIOC Logo">
            </div>
            <nav class="nav-links">
                <a href="../index.html">Inicio</a>
                <a href="../pages/que-es.html">¿Qué es AIIOC?</a>
                <a href="../pages/api.html">API</a>
                <a href="../pages/descarga.html">Descarga</a>
                <a href="../pages/nosotros.html">Nosotros</a>
                <a href="../pages/contacto.html">Contacto</a>
            </nav>
            <div class="login-btn">
                <a href="../pages/login.html" class="btn-login" style="background: #ffd700; color: #0f0f0f; padding: 0.8rem 2.5rem; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-size: 1rem; min-width: 150px; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3); transition: all 0.3s ease; text-decoration: none;">Iniciar Sesión</a>
            </div>
        </div>
    </header>

    <!-- Botón Volver Arriba -->
    <button class="back-to-top" aria-label="Volver al inicio">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Ponte en Contacto</h1>
            <p class="eslogan">¿Tienes preguntas o necesitas ayuda? Estamos aquí para asistirte</p>
        </div>
    </section>

    <!-- Contacto Section -->
    <section class="contacto animate-on-scroll">
        <div class="container">
            <div class="contact-form plan-card">
                <div class="form-header plan-header">
                    <h2>Envíanos un Mensaje</h2>
                    <p class="eslogan">¿Tienes alguna pregunta o necesitas ayuda? Nuestro equipo está aquí para asistirte</p>
                </div>
                <form action="#" method="POST" class="animate-on-scroll">
                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <div class="input-group">
                            <input type="text" id="nombre" name="nombre" required>
                            <i class="fas fa-user"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <div class="input-group">
                            <input type="email" id="email" name="email" required>
                            <i class="fas fa-envelope"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="telefono">Teléfono (opcional)</label>
                        <div class="input-group">
                            <input type="tel" id="telefono" name="telefono" pattern="[0-9]{9}">
                            <i class="fas fa-phone"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="mensaje">Mensaje</label>
                        <div class="input-group">
                            <textarea id="mensaje" name="mensaje" required></textarea>
                            <i class="fas fa-pencil-alt"></i>
                        </div>
                    </div>
                    <div>
                        <button class="btn-primary">Enviar Mensaje</button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <script src="../js/main.js"></script>
    <script src="../js/footer.js"></script>
</body>
</html>
