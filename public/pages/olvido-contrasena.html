<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - AIIOC</title>
    <link rel="icon" type="image/x-icon" href="../img/Logo_App.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="page-login">
    <section class="contacto">
        <div class="contact-form">
            <div class="form-header">
                <h2>Recuperar Contraseña</h2>
                <p class="eslogan">Ingresa tu correo electrónico para recibir instrucciones de recuperación</p>
            </div>
            <form action="/auth/password-reset" method="POST">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <div class="input-group">
                        <input type="email" id="email" name="email" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>
                <div class="form-actions">
                    <div class="btn-container">
                        <button type="submit" class="btn-primary">Enviar Instrucciones</button>
                    </div>
                    <div class="text-link">
                        <a href="../pages/login.html" class="link-secondary">¿Recuerdas tu contraseña? Inicia sesión</a>
                    </div>
                </div>
            </form>
        </div>
    </section>
    <script src="../js/main.js"></script>
</body>
</html>
